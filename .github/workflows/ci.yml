name: CI

on:
  push:
    branches: [aya-public]
  pull_request:
    branches: [aya-public]

jobs:
  build-and-test:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            compiler: g++-12
            packages: g++-12 cmake
          - os: ubuntu-latest
            compiler: clang++-18
            packages: clang-18 cmake
          - os: macos-latest
            compiler: clang++
            packages: ""

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.packages }}

      - name: Configure
        run: |
          cmake -B build \
            -DCMAKE_CXX_COMPILER=${{ matrix.compiler }} \
            -DAYA_BUILD_TESTS=ON \
            -DAYA_BUILD_BENCHMARKS=ON

      - name: Build
        run: cmake --build build

      - name: Test
        run: ctest --test-dir build --output-on-failure

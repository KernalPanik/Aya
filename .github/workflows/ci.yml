name: CI

on:
  push:
    branches: [aya-public]
  pull_request:
    branches: [aya-public]

jobs:
  build-and-test:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            compiler: g++
            flags: -std=c++20 -O2 -pthread
          - os: ubuntu-latest
            compiler: clang++
            flags: -std=c++20 -O2 -pthread
          - os: macos-latest
            compiler: clang++
            flags: -std=c++20 -O2 -pthread

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install GCC 12 (Ubuntu)
        if: matrix.os == 'ubuntu-latest' && matrix.compiler == 'g++'
        run: |
          sudo apt-get update
          sudo apt-get install -y g++-12
          echo "CXX=g++-12" >> $GITHUB_ENV

      - name: Install Clang 18 (Ubuntu)
        if: matrix.os == 'ubuntu-latest' && matrix.compiler == 'clang++'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-18
          echo "CXX=clang++-18" >> $GITHUB_ENV

      - name: Set compiler (macOS)
        if: matrix.os == 'macos-latest'
        run: echo "CXX=clang++" >> $GITHUB_ENV

      - name: Build tests
        run: $CXX ${{ matrix.flags }} -o aya_tests aya_tests.cpp

      - name: Run tests
        run: ./aya_tests

      - name: Build demo
        run: $CXX ${{ matrix.flags }} -o aya_demo aya_demo.cpp

      - name: Build parallel benchmark
        run: $CXX ${{ matrix.flags }} -o aya_par_bench aya_parallel_benchmark.cpp
